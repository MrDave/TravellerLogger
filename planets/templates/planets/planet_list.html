{% extends 'base.html' %}
{% load static %}

{% block content %}
    <img class="extra" src="{% static 'images/rotating_planet.gif' %}" width="1024" height="1024">
     <ul class="list border">
        {% for planet in planet_list %}
            <li>
                <a href="{% url 'planet-detail' pk=planet.id %}">{{ planet.name }}</a>
            </li>
        {% endfor %}
     </ul>
{% endblock %}
